<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CUET PG Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen">
    <nav class="bg-indigo-600 p-6 text-white shadow-lg">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold">CUET PG Calc</h1>
            <span class="text-xs bg-indigo-500 px-2 py-1 rounded">Live via GitHub Pages</span>
        </div>
    </nav>

    <main class="max-w-3xl mx-auto mt-12 p-6">
        <div class="bg-white rounded-3xl shadow-xl p-8 border border-slate-100">
            <h2 class="text-xl font-bold text-slate-800 mb-6">Enter Response Sheet Link</h2>
            
            <div class="space-y-4">
                <input type="text" id="urlInput" placeholder="https://exams.nta.ac.in/..." 
                    class="w-full p-4 rounded-2xl border-2 border-slate-100 focus:border-indigo-500 outline-none transition-all">
                
                <button onclick="calculate()" id="btn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl shadow-lg transition-transform active:scale-95">
                    Analyze Results
                </button>
            </div>

            <div id="loading" class="hidden mt-8 text-center text-slate-500 animate-pulse">
                Talking to Vercel Proxy... Parsing NTA data...
            </div>

            <div id="results" class="hidden mt-10 space-y-6">
                <div class="bg-indigo-50 p-6 rounded-3xl text-center">
                    <p class="text-sm font-bold text-indigo-400 uppercase tracking-widest">Total Attempted</p>
                    <p id="total" class="text-5xl font-black text-indigo-700">0</p>
                </div>
                
                <div class="border rounded-2xl overflow-hidden">
                    <table class="w-full text-left text-sm">
                        <thead class="bg-slate-50 border-b">
                            <tr>
                                <th class="p-4 font-bold">Question ID</th>
                                <th class="p-4 font-bold">Your Option</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody" class="divide-y"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        async function calculate() {
            const url = document.getElementById('urlInput').value.trim();
            if(!url) return;

            const btn = document.getElementById('btn');
            const loader = document.getElementById('loading');
            const resDiv = document.getElementById('results');

            btn.disabled = true;
            loader.classList.remove('hidden');
            resDiv.classList.add('hidden');

            try {
                // We point this directly to your Vercel URL
                const VERCEL_API = 'https://cuet-pg-calculator.vercel.app/api';
                
                const response = await fetch(VERCEL_API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: url })
                });

                const data = await response.json();
                if(data.error) throw new Error(data.error);

                const parser = new DOMParser();
                const doc = parser.parseFromString(data.html, 'text/html');
                const panels = doc.querySelectorAll('.question-pnl');
                
                let count = 0;
                let html = '';

                panels.forEach(p => {
                    const qId = Array.from(p.querySelectorAll('td')).find(td => td.innerText.includes('Question ID'))?.nextElementSibling?.innerText || "N/A";
                    const chosen = Array.from(p.querySelectorAll('td')).find(td => td.innerText.includes('Chosen Option'))?.nextElementSibling?.innerText || "--";
                    
                    if(chosen !== "--" && chosen !== "None") count++;

                    html += `<tr><td class="p-4 font-mono">${qId}</td><td class="p-4 font-bold text-indigo-600">${chosen}</td></tr>`;
                });

                document.getElementById('total').innerText = count;
                document.getElementById('tableBody').innerHTML = html;
                resDiv.classList.remove('hidden');
            } catch (e) {
                alert("Error: " + e.message);
            } finally {
                btn.disabled = false;
                loader.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
